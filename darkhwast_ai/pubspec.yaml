name: darkhwast_ai
description: "Pakistan's AI Citizen Rights Enforcement Engine — AISeekho 2026"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3

  # AI / Gemini
  google_generative_ai: ^0.4.6

  # OCR
  google_mlkit_text_recognition: ^0.13.1

  # Voice
  speech_to_text: ^7.0.0

  # Fonts & UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  lottie: ^3.1.2

  # Image / Camera
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  shared_preferences: ^2.5.5
  go_router: ^14.2.7
  permission_handler: ^12.0.1
  share_plus: ^13.1.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/mock_responses/
    - assets/images/

