name: darkhwast_ai
description: "Pakistan's AI Citizen Rights Enforcement Engine — AISeekho 2026"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1

  # AI / Gemini
  google_generative_ai: ^0.4.7

  # OCR
  google_mlkit_text_recognition: ^0.15.1

  # Voice
  speech_to_text: 7.3.0

  # Fonts & UI
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  percent_indicator: ^4.2.5
  lottie: ^3.3.3

  # Image / Camera (native camera via image_picker — no in-app CameraX)
  image_picker: ^1.2.2
  image: ^4.8.0
  crop_your_image: ^2.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.3
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  go_router: ^17.2.3
  permission_handler: ^12.0.1
  share_plus: ^13.1.0
  flutter_dotenv: ^6.0.1
  flutter_secure_storage: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - assets/mock_responses/
    - assets/images/

